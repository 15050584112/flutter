name: ccviewer_mobile_hub
description: Minimal Flutter client for cc-viewer mobile bridge (LAN/HUB).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  mobile_scanner: ^5.2.3
  shared_preferences: ^2.2.0
  flutter_markdown: ^0.7.6
  markdown: ^7.3.0
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  flutter_inappwebview: ^6.0.0   # WebView 插件
  speech_to_text: ^7.0.0         # iOS 语音识别插件

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
  macos:
    generate: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1a1a2e"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
